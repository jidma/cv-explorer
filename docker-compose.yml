services:
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    container_name: cv-explorer-db
    environment:
      POSTGRES_DB: cv_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
